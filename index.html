<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI 計算器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>BMI 計算器</h1>
    <form id="bmi-form" class="bmi-form">
      <label for="height">身高（公尺）</label>
      <input id="height" name="height" type="number" step="0.01" min="0" placeholder="例如 1.70" required />

      <label for="weight">體重（公斤）</label>
      <input id="weight" name="weight" type="number" step="0.1" min="0" placeholder="例如 65.0" required />

      <button type="submit">計算 BMI</button>
    </form>

    <section id="result" class="result hidden" aria-live="polite">
      <p>您的 BMI 是：</p>
      <strong id="bmi-value">0.00</strong>
      <p id="bmi-category"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
